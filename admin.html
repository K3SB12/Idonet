<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin | Floristería Santa Bárbara</title>
    <!-- QUITAMOS TAILWIND QUE ESTÁ CAUSANDO LOS PROBLEMAS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ESTILOS MANUALES - MÁXIMO CONTRASTE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        /* LOGIN */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background-color: white;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid #000;
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 25px;
            color: #000;
            font-weight: bold;
        }
        /* INPUTS - TOTALMENTE VISIBLES */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 3px solid #000 !important;
            border-radius: 12px;
            font-size: 18px;
            background-color: white !important;
            color: black !important;
        }
        /* BOTONES - GRANDES Y VISIBLES */
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            background-color: #2D5A3D;
            color: white;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid #000;
        }
        button:hover {
            background-color: #1e3f2a;
        }
        .btn-danger {
            background-color: #c41e3a;
        }
        .btn-danger:hover {
            background-color: #a01830;
        }
        .btn-gray {
            background-color: #4b5563;
        }
        .dashboard-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .dashboard-header button {
            width: auto;
            flex: 1;
            min-width: 100px;
            padding: 15px 10px;
        }
        .tab {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #000;
        }
        .tab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tab-header h2 {
            font-size: 24px;
            font-weight: bold;
            color: #000;
        }
        .tab-header button {
            width: auto;
            padding: 12px 20px;
            background-color: #2D5A3D;
        }
        /* MODAL */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 25px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 4px solid #000;
        }
        .modal-content h3 {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #000;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions button {
            flex: 1;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #000;
        }
        /* PREVIEW DE FOTOS */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .preview-item {
            position: relative;
        }
        .preview-item img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #000;
        }
        .preview-item button {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background-color: #c41e3a;
            color: white;
            border-radius: 50%;
            padding: 0;
            font-size: 14px;
        }
        .producto-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 2px solid #ddd;
        }
        .producto-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #000;
        }
        .categoria-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .categoria-card {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #000;
            text-align: center;
        }
        .categoria-card .icono {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>🌸 Santa Bárbara</h1>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="clave" placeholder="Contraseña">
            <button onclick="login()">ENTRAR</button>
            <p style="text-align: center; margin-top: 20px; font-size: 16px; color: #000;">Primera vez: crea tu cuenta</p>
        </div>
    </div>

    <!-- Dashboard (oculto inicialmente) -->
    <div id="dashboard" class="hidden">
        <div class="dashboard-header">
            <button onclick="showTab('productos')">📦 Productos</button>
            <button onclick="showTab('categorias')">🏷️ Categorías</button>
            <button onclick="showTab('backup')">💾 Backup</button>
            <button onclick="logout()" class="btn-danger">🚪 Salir</button>
        </div>

        <!-- Productos -->
        <div id="tab-productos" class="tab">
            <div class="tab-header">
                <h2>📦 Productos</h2>
                <button onclick="abrirModalProducto()">+ NUEVO</button>
            </div>
            <div id="listaProductos"></div>
        </div>

        <!-- Categorías -->
        <div id="tab-categorias" class="tab hidden">
            <div class="tab-header">
                <h2>🏷️ Categorías</h2>
                <button onclick="abrirModalCategoria()">+ NUEVA</button>
            </div>
            <div id="listaCategorias" class="categoria-grid"></div>
        </div>

        <!-- Backup -->
        <div id="tab-backup" class="tab hidden">
            <h2 style="font-size: 24px; margin-bottom: 20px;">💾 Copia de Seguridad</h2>
            <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px solid #000; margin-bottom: 20px;">
                <button onclick="exportarDatos()" style="background-color: #2D5A3D;">📥 DESCARGAR BACKUP</button>
                <p style="margin-top: 10px;">Guarda este archivo para cambiar de celular</p>
            </div>
            <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px solid #000;">
                <input type="file" id="inputBackup" accept=".json" class="hidden" onchange="importarDatos(this)">
                <button onclick="document.getElementById('inputBackup').click()" style="background-color: #2563eb;">📤 RESTAURAR BACKUP</button>
                <p style="margin-top: 10px;">Selecciona el archivo que guardaste</p>
            </div>
        </div>
    </div>

    <!-- Modal Categoría -->
    <div id="modalCategoria" class="modal hidden">
        <div class="modal-content">
            <h3 id="tituloModalCat">Nueva Categoría</h3>
            <input type="hidden" id="catId">
            
            <label>ID único</label>
            <input type="text" id="catIdInput" placeholder="rosas-rojas">
            
            <label>Nombre</label>
            <input type="text" id="catNombre" placeholder="Ramos de Rosas">
            
            <label>Icono</label>
            <input type="text" id="catIcono" value="🌸">
            
            <label style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
                <input type="checkbox" id="catActiva" checked style="width: 20px; height: 20px;"> Activa
            </label>
            
            <div class="modal-actions">
                <button onclick="cerrarModal('modalCategoria')" class="btn-gray">CANCELAR</button>
                <button onclick="guardarCategoria()">GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- Modal Producto -->
    <div id="modalProducto" class="modal hidden">
        <div class="modal-content">
            <h3 id="tituloModal">Nuevo Producto</h3>
            <input type="hidden" id="prodId">
            
            <label>Código</label>
            <input type="text" id="prodCodigo" placeholder="Ej: ROS-001">
            
            <label>Nombre</label>
            <input type="text" id="prodNombre" placeholder="Ej: Ramo de Rosas">
            
            <label>Categoría</label>
            <select id="prodCategoria"></select>
            
            <label>Stock</label>
            <input type="number" id="prodStock" value="10">
            
            <label>Descripción</label>
            <textarea id="prodDescripcion" rows="2" placeholder="Descripción del producto..."></textarea>
            
            <label>Precio regular</label>
            <input type="number" id="prodPrecioRegular" placeholder="28000">
            
            <label>Precio oferta</label>
            <input type="number" id="prodPrecioTemporada" placeholder="24000">
            
            <label style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
                <input type="checkbox" id="prodTemporadaActivo" style="width: 20px; height: 20px;"> Activar oferta
            </label>
            
            <label>Fotos</label>
            <div style="border: 3px dashed #000; padding: 25px; text-align: center; cursor: pointer; background: #f9f9f9;" onclick="document.getElementById('inputFotos').click()">
                <p style="font-size: 18px;">📸 TOCA PARA SUBIR FOTOS</p>
                <p style="font-size: 14px;">Máximo 15 fotos</p>
                <input type="file" id="inputFotos" multiple accept="image/*" class="hidden" onchange="procesarFotos(this)">
            </div>
            <div id="previewFotos" class="preview-grid"></div>
            
            <div style="display: flex; gap: 20px; margin: 20px 0;">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="prodActivo" checked style="width: 20px; height: 20px;"> Activo
                </label>
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="prodDestacado" style="width: 20px; height: 20px;"> Destacado
                </label>
            </div>
            
            <div class="modal-actions">
                <button onclick="cerrarModal('modalProducto')" class="btn-gray">CANCELAR</button>
                <button onclick="guardarProducto()">GUARDAR PRODUCTO</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'floristeria_completa';
        const AUTH_KEY = 'admin_auth';
        
        let datos = {
            productos: [],
            categorias: [],
            pedidos: [],
            config: { whatsapp: '50686053613', tarifaExpress: 650 }
        };
        let fotosTemp = [];

        function guardarDatos() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
                return true;
            } catch(e) {
                alert('❌ Error al guardar. Espacio lleno.');
                return false;
            }
        }

        function cargarDatos() {
            const guardado = localStorage.getItem(STORAGE_KEY);
            if (guardado) {
                try {
                    datos = JSON.parse(guardado);
                } catch(e) {
                    datos = { productos: [], categorias: [], pedidos: [], config: datos.config };
                }
            }
            renderizarCategorias();
            renderizarProductos();
        }

        // Autenticación
        function verificarSesion() {
            if (localStorage.getItem(AUTH_KEY) === 'ok') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                cargarDatos();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const clave = document.getElementById('clave').value;
            if (!email || !clave) return alert('❌ Ingresa email y contraseña');
            
            const hash = await hashString(email + clave);
            const guardado = localStorage.getItem('admin_hash');
            
            if (!guardado) {
                localStorage.setItem('admin_hash', hash);
                localStorage.setItem(AUTH_KEY, 'ok');
                location.reload();
            } else if (guardado === hash) {
                localStorage.setItem(AUTH_KEY, 'ok');
                location.reload();
            } else {
                alert('❌ Credenciales incorrectas');
            }
        }

        async function hashString(str) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        function logout() {
            if (confirm('¿Cerrar sesión?')) {
                localStorage.removeItem(AUTH_KEY);
                location.reload();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            if (tab === 'productos') renderizarProductos();
            if (tab === 'categorias') renderizarCategorias();
        }

        // CATEGORÍAS
        function renderizarCategorias() {
            const container = document.getElementById('listaCategorias');
            if (!datos.categorias || datos.categorias.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 30px;">No hay categorías. Crea una.</p>';
                return;
            }
            container.innerHTML = datos.categorias.map(c => `
                <div class="categoria-card">
                    <div class="icono">${c.icono || '🌸'}</div>
                    <h3 style="font-weight: bold; font-size: 18px; margin: 5px 0;">${c.nombre}</h3>
                    <p style="font-size: 12px; color: #666;">${c.id}</p>
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                        <button style="width: auto; padding: 8px 15px; background-color: #2563eb;" onclick="abrirModalCategoria('${c.id}')">✏️</button>
                        <button style="width: auto; padding: 8px 15px; background-color: #c41e3a;" onclick="eliminarCategoria('${c.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModalCategoria(id = null) {
            document.getElementById('modalCategoria').classList.remove('hidden');
            if (id) {
                const c = datos.categorias.find(x => x.id === id);
                document.getElementById('catId').value = c.id;
                document.getElementById('catIdInput').value = c.id;
                document.getElementById('catIdInput').disabled = true;
                document.getElementById('catNombre').value = c.nombre;
                document.getElementById('catIcono').value = c.icono;
                document.getElementById('catActiva').checked = c.activa !== false;
            } else {
                document.getElementById('catId').value = '';
                document.getElementById('catIdInput').value = '';
                document.getElementById('catIdInput').disabled = false;
                document.getElementById('catNombre').value = '';
                document.getElementById('catIcono').value = '🌸';
                document.getElementById('catActiva').checked = true;
            }
        }

        function guardarCategoria() {
            const id = document.getElementById('catIdInput').value.trim().toLowerCase().replace(/\s+/g, '-');
            const nombre = document.getElementById('catNombre').value.trim();
            if (!id || !nombre) return alert('❌ ID y nombre obligatorios');
            
            const categoria = {
                id: document.getElementById('catId').value || id,
                nombre: nombre,
                icono: document.getElementById('catIcono').value || '🌸',
                activa: document.getElementById('catActiva').checked
            };
            
            if (document.getElementById('catId').value) {
                const index = datos.categorias.findIndex(c => c.id === categoria.id);
                if (index !== -1) datos.categorias[index] = categoria;
            } else {
                if (datos.categorias.some(c => c.id === id)) return alert('❌ ID ya existe');
                datos.categorias.push(categoria);
            }
            
            guardarDatos();
            cerrarModal('modalCategoria');
            renderizarCategorias();
            alert('✅ Categoría guardada');
        }

        function eliminarCategoria(id) {
            if (confirm('¿Eliminar categoría?')) {
                datos.categorias = datos.categorias.filter(c => c.id !== id);
                guardarDatos();
                renderizarCategorias();
            }
        }

        // PRODUCTOS
        function renderizarProductos() {
            const container = document.getElementById('listaProductos');
            if (!datos.productos || datos.productos.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 30px;">No hay productos. Crea uno.</p>';
                return;
            }
            container.innerHTML = datos.productos.map(p => `
                <div class="producto-item">
                    <img src="${p.imagenes?.[0] || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                    <div style="flex: 1;">
                        <h3 style="font-weight: bold;">${p.nombre}</h3>
                        <p>${p.codigo} - ₡${(p.precioTemporadaActivo ? p.precioTemporada : p.precioRegular)?.toLocaleString() || 0}</p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button style="width: auto; padding: 8px 15px; background-color: #2563eb;" onclick="abrirModalProducto('${p.id}')">✏️</button>
                        <button style="width: auto; padding: 8px 15px; background-color: #c41e3a;" onclick="eliminarProducto('${p.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModalProducto(id = null) {
            document.getElementById('modalProducto').classList.remove('hidden');
            
            const select = document.getElementById('prodCategoria');
            select.innerHTML = '<option value="">Selecciona una categoría</option>' + 
                (datos.categorias || []).map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            
            fotosTemp = [];
            
            if (id) {
                const p = datos.productos.find(x => x.id === id);
                document.getElementById('prodId').value = p.id;
                document.getElementById('prodCodigo').value = p.codigo || '';
                document.getElementById('prodNombre').value = p.nombre || '';
                document.getElementById('prodCategoria').value = p.categoria || '';
                document.getElementById('prodDescripcion').value = p.descripcion || '';
                document.getElementById('prodStock').value = p.stock || 0;
                document.getElementById('prodPrecioRegular').value = p.precioRegular || '';
                document.getElementById('prodPrecioTemporada').value = p.precioTemporada || '';
                document.getElementById('prodTemporadaActivo').checked = p.precioTemporadaActivo || false;
                document.getElementById('prodActivo').checked = p.activo !== false;
                document.getElementById('prodDestacado').checked = p.destacado || false;
                if (p.imagenes) fotosTemp = [...p.imagenes];
            } else {
                document.getElementById('prodId').value = '';
                document.getElementById('prodCodigo').value = '';
                document.getElementById('prodNombre').value = '';
                document.getElementById('prodDescripcion').value = '';
                document.getElementById('prodStock').value = '10';
                document.getElementById('prodPrecioRegular').value = '';
                document.getElementById('prodPrecioTemporada').value = '';
                document.getElementById('prodTemporadaActivo').checked = false;
                document.getElementById('prodActivo').checked = true;
                document.getElementById('prodDestacado').checked = false;
            }
            renderizarPreviews();
        }

        function procesarFotos(input) {
            const archivos = Array.from(input.files);
            if (fotosTemp.length + archivos.length > 15) return alert('❌ Máximo 15 fotos');
            
            archivos.forEach(archivo => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // ESTO ES LO QUE CAMBIA - AHORA 200px y calidad 0.3
                        let width = img.width, height = img.height;
                        const maxSize = 200;  // CAMBIADO DE 400 a 200
                        
                        if (width > height && width > maxSize) { 
                            height *= maxSize / width; 
                            width = maxSize; 
                        } else if (height > maxSize) { 
                            width *= maxSize / height; 
                            height = maxSize; 
                        }
                        
                        canvas.width = width; 
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // CAMBIADO DE 0.6 a 0.3
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.3);
                        
                        fotosTemp.push(dataUrl);
                        renderizarPreviews();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(archivo);
            });
            input.value = '';
        }
        function renderizarPreviews() {
            document.getElementById('previewFotos').innerHTML = fotosTemp.map((f, i) => `
                <div class="preview-item">
                    <img src="${f}">
                    <button onclick="fotosTemp.splice(${i},1);renderizarPreviews()">✕</button>
                </div>
            `).join('');
        }

        function guardarProducto() {
            // RECOLECTAR TODOS LOS DATOS DEL FORMULARIO
            const id = document.getElementById('prodId').value;
            const codigo = document.getElementById('prodCodigo').value.trim();
            const nombre = document.getElementById('prodNombre').value.trim();
            const categoria = document.getElementById('prodCategoria').value;
            const descripcion = document.getElementById('prodDescripcion').value.trim();
            const stock = parseInt(document.getElementById('prodStock').value) || 0;
            const precioRegular = parseInt(document.getElementById('prodPrecioRegular').value) || 0;
            const precioTemporada = parseInt(document.getElementById('prodPrecioTemporada').value) || null;
            const precioTemporadaActivo = document.getElementById('prodTemporadaActivo').checked;
            const activo = document.getElementById('prodActivo').checked;
            const destacado = document.getElementById('prodDestacado').checked;
            
            // VALIDACIONES BÁSICAS
            if (!codigo || !nombre) {
                alert('❌ Código y nombre son obligatorios');
                return;
            }
            
            if (!categoria) {
                alert('❌ Selecciona una categoría');
                return;
            }
            
            if (precioRegular <= 0) {
                alert('❌ El precio regular debe ser mayor a 0');
                return;
            }
            
            // CREAR OBJETO PRODUCTO
            const producto = {
                id: id || 'prod-' + Date.now(),
                codigo: codigo,
                nombre: nombre,
                categoria: categoria,
                descripcion: descripcion,
                stock: stock,
                precioRegular: precioRegular,
                precioTemporada: precioTemporada,
                precioTemporadaActivo: precioTemporadaActivo,
                imagenes: [...fotosTemp],  // IMPORTANTE: COPIAR LAS FOTOS
                activo: activo,
                destacado: destacado
            };
            
            console.log('📦 Guardando producto:', producto);
            console.log('📸 Fotos incluidas:', fotosTemp.length);
            
            // GUARDAR EN localStorage
            if (id) {
                // EDITAR PRODUCTO EXISTENTE
                const index = datos.productos.findIndex(p => p.id === id);
                if (index !== -1) {
                    datos.productos[index] = producto;
                } else {
                    datos.productos.push(producto);
                }
            } else {
                // NUEVO PRODUCTO
                datos.productos.push(producto);
            }
            
            // INTENTAR GUARDAR EN LOCALSTORAGE
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
                
                // LIMPIAR Y CERRAR
                fotosTemp = [];
                cerrarModal('modalProducto');
                renderizarProductos();
                alert('✅ Producto guardado correctamente');
                
            } catch (e) {
                console.error('Error al guardar:', e);
                
                if (e.name === 'QuotaExceededError') {
                    alert('❌ ERROR: Las fotos pesan demasiado. Usa fotos más pequeñas o menos fotos.');
                } else {
                    alert('❌ Error al guardar. Intenta de nuevo.');
                }
            }
        }
        function eliminarProducto(id) {
            if (confirm('¿Eliminar producto?')) {
                datos.productos = datos.productos.filter(p => p.id !== id);
                guardarDatos();
                renderizarProductos();
            }
        }

        // BACKUP
        function exportarDatos() {
            const backup = {
                productos: datos.productos,
                categorias: datos.categorias,
                pedidos: datos.pedidos || [],
                config: datos.config
            };
            const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importarDatos(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (confirm('¿Restaurar? Se perderán los datos actuales')) {
                        datos = backup;
                        guardarDatos();
                        location.reload();
                    }
                } catch(e) {
                    alert('❌ Archivo inválido');
                }
            };
            reader.readAsText(file);
        }

        function cerrarModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        window.onload = verificarSesion;
    </script>
</body>
</html>
