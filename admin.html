<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin | Floristería Santa Bárbara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos críticos para que se vea en celular -->
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; }
        input, select, textarea { 
            background-color: #ffffff !important; 
            color: #000000 !important; 
            border: 2px solid #cccccc !important;
            padding: 12px !important;
            font-size: 16px !important;
            width: 100% !important;
            border-radius: 8px !important;
        }
        button { 
            min-height: 48px !important; 
            font-size: 16px !important;
            background-color: #2D5A3D !important;
            color: white !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 12px 24px !important;
            font-weight: bold !important;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            margin: 20px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Login -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
            <h1 class="text-2xl font-bold text-center mb-6">🌸 Santa Bárbara</h1>
            <input type="email" id="email" placeholder="Correo electrónico" class="w-full mb-4">
            <input type="password" id="clave" placeholder="Contraseña" class="w-full mb-4">
            <button onclick="login()" class="w-full bg-green-700 text-white py-3 rounded-lg font-bold">Entrar</button>
            <p class="text-sm text-center mt-4 text-gray-600">Primera vez: crea tu cuenta</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden p-4">
        <div class="flex gap-2 mb-4 overflow-x-auto">
            <button onclick="showTab('productos')" class="px-4 py-2 bg-green-700 text-white rounded-lg">Productos</button>
            <button onclick="showTab('categorias')" class="px-4 py-2 bg-gray-500 text-white rounded-lg">Categorías</button>
            <button onclick="showTab('backup')" class="px-4 py-2 bg-gray-500 text-white rounded-lg">Backup</button>
            <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg">Salir</button>
        </div>

        <!-- Productos -->
        <div id="tab-productos" class="tab-content">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-bold">Productos</h2>
                <button onclick="abrirModalProducto()" class="bg-green-700 text-white px-4 py-2 rounded-lg">+ Nuevo</button>
            </div>
            <div id="listaProductos" class="bg-white p-4 rounded-lg"></div>
        </div>

        <!-- Categorías -->
        <div id="tab-categorias" class="tab-content hidden">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-bold">Categorías</h2>
                <button onclick="abrirModalCategoria()" class="bg-green-700 text-white px-4 py-2 rounded-lg">+ Nueva</button>
            </div>
            <div id="listaCategorias" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Backup -->
        <div id="tab-backup" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">Copia de Seguridad</h2>
            <div class="bg-white p-4 rounded-lg mb-4">
                <button onclick="exportarDatos()" class="w-full bg-green-600 text-white py-3 rounded-lg mb-2">📥 Descargar Backup</button>
                <p class="text-sm text-gray-600">Guarda este archivo para cambiar de celular</p>
            </div>
            <div class="bg-white p-4 rounded-lg">
                <input type="file" id="inputBackup" accept=".json" class="hidden" onchange="importarDatos(this)">
                <button onclick="document.getElementById('inputBackup').click()" class="w-full bg-blue-600 text-white py-3 rounded-lg">📤 Restaurar Backup</button>
                <p class="text-sm text-gray-600 mt-2">Selecciona el archivo que guardaste</p>
            </div>
        </div>
    </div>

    <!-- Modal Categoría -->
    <div id="modalCategoria" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">Nueva Categoría</h3>
            <input type="hidden" id="catId">
            <div class="mb-4">
                <label class="block mb-2 font-bold">ID único</label>
                <input type="text" id="catIdInput" class="w-full p-3 border-2 border-gray-300 rounded-lg" placeholder="rosas-rojas">
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-bold">Nombre</label>
                <input type="text" id="catNombre" class="w-full p-3 border-2 border-gray-300 rounded-lg" placeholder="Ramos de Rosas">
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-bold">Icono</label>
                <input type="text" id="catIcono" class="w-full p-3 border-2 border-gray-300 rounded-lg" value="🌸">
            </div>
            <div class="mb-4">
                <label class="flex items-center">
                    <input type="checkbox" id="catActiva" checked class="mr-2 w-5 h-5"> Activa
                </label>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="cerrarModal('modalCategoria')" class="px-6 py-3 bg-gray-500 text-white rounded-lg">Cancelar</button>
                <button onclick="guardarCategoria()" class="px-6 py-3 bg-green-700 text-white rounded-lg">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Producto -->
    <div id="modalProducto" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6">
            <h3 class="text-xl font-bold mb-4">Nuevo Producto</h3>
            <input type="hidden" id="prodId">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block mb-2 font-bold">Código</label>
                    <input type="text" id="prodCodigo" class="w-full p-3 border-2 border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block mb-2 font-bold">Nombre</label>
                    <input type="text" id="prodNombre" class="w-full p-3 border-2 border-gray-300 rounded-lg">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block mb-2 font-bold">Categoría</label>
                    <select id="prodCategoria" class="w-full p-3 border-2 border-gray-300 rounded-lg"></select>
                </div>
                <div>
                    <label class="block mb-2 font-bold">Stock</label>
                    <input type="number" id="prodStock" value="10" class="w-full p-3 border-2 border-gray-300 rounded-lg">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block mb-2 font-bold">Descripción</label>
                <textarea id="prodDescripcion" rows="2" class="w-full p-3 border-2 border-gray-300 rounded-lg"></textarea>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block mb-2 font-bold">Precio regular</label>
                    <input type="number" id="prodPrecioRegular" class="w-full p-3 border-2 border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block mb-2 font-bold">Precio oferta</label>
                    <input type="number" id="prodPrecioTemporada" class="w-full p-3 border-2 border-gray-300 rounded-lg">
                </div>
                <div class="flex items-end pb-3">
                    <label class="flex items-center">
                        <input type="checkbox" id="prodTemporadaActivo" class="mr-2 w-5 h-5"> Activar oferta
                    </label>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block mb-2 font-bold">Fotos</label>
                <div class="border-2 border-dashed p-6 text-center cursor-pointer bg-gray-50 rounded-lg" onclick="document.getElementById('inputFotos').click()">
                    <p class="text-lg">📸 Haz clic para subir fotos</p>
                    <p class="text-sm text-gray-600">Máximo 15 fotos</p>
                    <input type="file" id="inputFotos" multiple accept="image/*" class="hidden" onchange="procesarFotos(this)">
                </div>
                <div id="previewFotos" class="grid grid-cols-4 gap-2 mt-4"></div>
            </div>
            
            <div class="flex gap-4 mb-4">
                <label class="flex items-center">
                    <input type="checkbox" id="prodActivo" checked class="mr-2 w-5 h-5"> Activo
                </label>
                <label class="flex items-center">
                    <input type="checkbox" id="prodDestacado" class="mr-2 w-5 h-5"> Destacado
                </label>
            </div>
            
            <div class="flex gap-2 justify-end">
                <button onclick="cerrarModal('modalProducto')" class="px-6 py-3 bg-gray-500 text-white rounded-lg">Cancelar</button>
                <button onclick="guardarProducto()" class="px-6 py-3 bg-green-700 text-white rounded-lg">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'floristeria_completa';
        const AUTH_KEY = 'admin_auth';
        
        let datos = {
            productos: [],
            categorias: [],
            pedidos: [],
            config: { whatsapp: '50686053613', tarifaExpress: 650 }
        };
        let fotosTemp = [];

        function guardarDatos() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
                return true;
            } catch(e) {
                alert('Error al guardar');
                return false;
            }
        }

        function cargarDatos() {
            const guardado = localStorage.getItem(STORAGE_KEY);
            if (guardado) datos = JSON.parse(guardado);
            actualizarContadores();
            renderizarCategorias();
            renderizarProductos();
        }

        function actualizarContadores() {
            document.getElementById('countProductos').textContent = datos.productos.length;
            document.getElementById('countCategorias').textContent = datos.categorias.length;
        }

        // Autenticación
        function verificarSesion() {
            if (localStorage.getItem(AUTH_KEY) === 'ok') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                cargarDatos();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const clave = document.getElementById('clave').value;
            if (!email || !clave) return alert('Ingresa email y contraseña');
            
            const hash = await hashString(email + clave);
            const guardado = localStorage.getItem('admin_hash');
            
            if (!guardado) {
                localStorage.setItem('admin_hash', hash);
                localStorage.setItem(AUTH_KEY, 'ok');
                location.reload();
            } else if (guardado === hash) {
                localStorage.setItem(AUTH_KEY, 'ok');
                location.reload();
            } else {
                alert('Credenciales incorrectas');
            }
        }

        async function hashString(str) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        function logout() {
            if (confirm('¿Cerrar sesión?')) {
                localStorage.removeItem(AUTH_KEY);
                location.reload();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            if (tab === 'productos') renderizarProductos();
            if (tab === 'categorias') renderizarCategorias();
        }

        // Categorías
        function renderizarCategorias() {
            const container = document.getElementById('listaCategorias');
            if (datos.categorias.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">No hay categorías</p>';
                return;
            }
            container.innerHTML = datos.categorias.map(c => `
                <div class="bg-white p-4 rounded-lg shadow">
                    <div class="text-3xl mb-2">${c.icono}</div>
                    <h3 class="font-bold">${c.nombre}</h3>
                    <div class="flex gap-2 mt-2">
                        <button onclick="abrirModalCategoria('${c.id}')" class="text-blue-600">✏️</button>
                        <button onclick="eliminarCategoria('${c.id}')" class="text-red-600">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModalCategoria(id = null) {
            document.getElementById('modalCategoria').classList.remove('hidden');
            if (id) {
                const c = datos.categorias.find(x => x.id === id);
                document.getElementById('catId').value = c.id;
                document.getElementById('catIdInput').value = c.id;
                document.getElementById('catIdInput').disabled = true;
                document.getElementById('catNombre').value = c.nombre;
                document.getElementById('catIcono').value = c.icono;
                document.getElementById('catActiva').checked = c.activa;
            } else {
                document.getElementById('catId').value = '';
                document.getElementById('catIdInput').value = '';
                document.getElementById('catIdInput').disabled = false;
                document.getElementById('catNombre').value = '';
                document.getElementById('catIcono').value = '🌸';
                document.getElementById('catActiva').checked = true;
            }
        }

        function guardarCategoria() {
            const id = document.getElementById('catIdInput').value.trim().toLowerCase().replace(/\s+/g, '-');
            const nombre = document.getElementById('catNombre').value.trim();
            if (!id || !nombre) return alert('ID y nombre obligatorios');
            
            const categoria = {
                id: document.getElementById('catId').value || id,
                nombre: nombre,
                icono: document.getElementById('catIcono').value || '🌸',
                activa: document.getElementById('catActiva').checked
            };
            
            if (document.getElementById('catId').value) {
                const index = datos.categorias.findIndex(c => c.id === categoria.id);
                datos.categorias[index] = categoria;
            } else {
                if (datos.categorias.some(c => c.id === id)) return alert('ID ya existe');
                datos.categorias.push(categoria);
            }
            
            guardarDatos();
            cerrarModal('modalCategoria');
            renderizarCategorias();
            actualizarContadores();
        }

        function eliminarCategoria(id) {
            if (confirm('¿Eliminar categoría?')) {
                datos.categorias = datos.categorias.filter(c => c.id !== id);
                guardarDatos();
                renderizarCategorias();
                actualizarContadores();
            }
        }

        // Productos
        function renderizarProductos() {
            const container = document.getElementById('listaProductos');
            if (datos.productos.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">No hay productos</p>';
                return;
            }
            container.innerHTML = datos.productos.map(p => `
                <div class="border-b p-4 flex items-center gap-4">
                    <img src="${p.imagenes?.[0] || 'https://via.placeholder.com/50'}" class="w-12 h-12 object-cover rounded">
                    <div class="flex-1">
                        <h3 class="font-bold">${p.nombre}</h3>
                        <p class="text-sm">${p.codigo}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="abrirModalProducto('${p.id}')" class="text-blue-600">✏️</button>
                        <button onclick="eliminarProducto('${p.id}')" class="text-red-600">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModalProducto(id = null) {
            document.getElementById('modalProducto').classList.remove('hidden');
            
            const select = document.getElementById('prodCategoria');
            select.innerHTML = datos.categorias.map(c => `<option value="${c.id}">${c.nombre}</option>`);
            
            fotosTemp = [];
            
            if (id) {
                const p = datos.productos.find(x => x.id === id);
                document.getElementById('prodId').value = p.id;
                document.getElementById('prodCodigo').value = p.codigo;
                document.getElementById('prodNombre').value = p.nombre;
                document.getElementById('prodCategoria').value = p.categoria;
                document.getElementById('prodDescripcion').value = p.descripcion || '';
                document.getElementById('prodStock').value = p.stock || 0;
                document.getElementById('prodPrecioRegular').value = p.precioRegular;
                document.getElementById('prodPrecioTemporada').value = p.precioTemporada || '';
                document.getElementById('prodTemporadaActivo').checked = p.precioTemporadaActivo || false;
                document.getElementById('prodActivo').checked = p.activo !== false;
                document.getElementById('prodDestacado').checked = p.destacado || false;
                if (p.imagenes) fotosTemp = [...p.imagenes];
            } else {
                document.getElementById('prodId').value = '';
                document.getElementById('prodCodigo').value = '';
                document.getElementById('prodNombre').value = '';
                document.getElementById('prodDescripcion').value = '';
                document.getElementById('prodStock').value = '10';
                document.getElementById('prodPrecioRegular').value = '';
                document.getElementById('prodPrecioTemporada').value = '';
                document.getElementById('prodTemporadaActivo').checked = false;
                document.getElementById('prodActivo').checked = true;
                document.getElementById('prodDestacado').checked = false;
            }
            renderizarPreviews();
        }

        function procesarFotos(input) {
            const archivos = Array.from(input.files);
            if (fotosTemp.length + archivos.length > 15) return alert('Máximo 15 fotos');
            
            archivos.forEach(archivo => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        let width = img.width, height = img.height;
                        const maxSize = 400;
                        if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
                        else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        fotosTemp.push(canvas.toDataURL('image/jpeg', 0.6));
                        renderizarPreviews();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(archivo);
            });
            input.value = '';
        }

        function renderizarPreviews() {
            document.getElementById('previewFotos').innerHTML = fotosTemp.map((f, i) => `
                <div class="relative">
                    <img src="${f}" class="w-full h-16 object-cover rounded">
                    <button onclick="fotosTemp.splice(${i},1);renderizarPreviews()" class="absolute -top-1 -right-1 bg-red-500 text-white w-5 h-5 rounded-full text-xs">✕</button>
                </div>
            `).join('');
        }

        function guardarProducto() {
            const producto = {
                id: document.getElementById('prodId').value || 'prod-' + Date.now(),
                codigo: document.getElementById('prodCodigo').value.trim(),
                nombre: document.getElementById('prodNombre').value.trim(),
                categoria: document.getElementById('prodCategoria').value,
                descripcion: document.getElementById('prodDescripcion').value.trim(),
                stock: parseInt(document.getElementById('prodStock').value) || 0,
                precioRegular: parseInt(document.getElementById('prodPrecioRegular').value) || 0,
                precioTemporada: parseInt(document.getElementById('prodPrecioTemporada').value) || null,
                precioTemporadaActivo: document.getElementById('prodTemporadaActivo').checked,
                imagenes: [...fotosTemp],
                activo: document.getElementById('prodActivo').checked,
                destacado: document.getElementById('prodDestacado').checked
            };
            
            if (!producto.codigo || !producto.nombre) return alert('Código y nombre obligatorios');
            
            if (document.getElementById('prodId').value) {
                const index = datos.productos.findIndex(p => p.id === producto.id);
                datos.productos[index] = producto;
            } else {
                datos.productos.push(producto);
            }
            
            if (guardarDatos()) {
                cerrarModal('modalProducto');
                renderizarProductos();
                actualizarContadores();
                alert('✅ Producto guardado');
            }
        }

        function eliminarProducto(id) {
            if (confirm('¿Eliminar producto?')) {
                datos.productos = datos.productos.filter(p => p.id !== id);
                guardarDatos();
                renderizarProductos();
                actualizarContadores();
            }
        }

        // Backup
        function exportarDatos() {
            const backup = {
                productos: datos.productos,
                categorias: datos.categorias,
                pedidos: datos.pedidos || [],
                config: datos.config
            };
            const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importarDatos(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (confirm('¿Restaurar? Se perderán los datos actuales')) {
                        datos = backup;
                        guardarDatos();
                        location.reload();
                    }
                } catch(e) {
                    alert('Archivo inválido');
                }
            };
            reader.readAsText(file);
        }

        function cerrarModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        window.onload = verificarSesion;
    </script>
</body>
</html>
