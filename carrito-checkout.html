<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito y Checkout | Floristería Santa Bárbara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sb: { green: '#2D5A3D', 'green-light': '#4A7C59', cream: '#F5F1E8', rose: '#C41E3A', 'rose-soft': '#E8B4B8', gold: '#D4AF37', dark: '#1A1A1A' }
                    },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        #map { height: 350px; border-radius: 1rem; }
        @media (max-width: 640px) { #map { height: 280px; } }
        .step-active { background-color: #2D5A3D; color: white; }
        .step-completed { background-color: #4A7C59; color: white; }
        .step-pending { background-color: #e5e7eb; color: #6b7280; }
    </style>
</head>
<body class="font-sans bg-sb-cream text-sb-dark min-h-screen">
    <!-- Header -->
    <header class="fixed w-full top-0 z-50 bg-white/95 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <span class="text-3xl animate-float">🌸</span>
                <h1 class="font-serif text-xl font-bold text-sb-green">Santa Bárbara</h1>
            </a>
            <a href="index.html" class="text-sb-green hover:text-sb-green-light">
                ← Seguir comprando
            </a>
        </div>
    </header>

    <main class="pt-24 pb-16 max-w-4xl mx-auto px-4">
        <h1 class="font-serif text-3xl md:text-4xl text-center mb-8">Finalizar tu pedido</h1>

        <!-- Progress Steps -->
        <div class="flex justify-center gap-4 mb-10">
            <div class="flex items-center gap-2">
                <div id="step1" class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-active">1</div>
                <span class="hidden sm:block">Carrito</span>
            </div>
            <div class="w-12 h-0.5 bg-gray-300 self-center"></div>
            <div class="flex items-center gap-2">
                <div id="step2" class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-pending">2</div>
                <span class="hidden sm:block">Datos & Entrega</span>
            </div>
            <div class="w-12 h-0.5 bg-gray-300 self-center"></div>
            <div class="flex items-center gap-2">
                <div id="step3" class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-pending">3</div>
                <span class="hidden sm:block">Confirmar</span>
            </div>
        </div>

        <!-- Paso 1: Carrito -->
        <div id="stepContent1" class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-8">
            <h2 class="font-serif text-2xl mb-6">Tu carrito</h2>
            <div id="carritoItems" class="space-y-6 mb-8"></div>
            <div class="bg-sb-cream rounded-xl p-6">
                <div class="flex justify-between text-lg font-medium mb-2">
                    <span>Subtotal:</span>
                    <span id="subtotal">₡0</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-sb-green">
                    <span>Total:</span>
                    <span id="total">₡0</span>
                </div>
            </div>
            <button onclick="goToStep(2)" class="w-full mt-6 bg-sb-green text-white py-4 rounded-xl font-bold text-lg hover:bg-sb-green-light transition">
                Continuar a entrega <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>

        <!-- Paso 2: Datos y entrega (el resto del checkout que ya tenías) -->
        <!-- ... Aquí va todo el contenido de tu checkout anterior: datos personales, mapa, tipo entrega, referencias, etc. ... -->
        <!-- Copia el contenido de tu checkout.html desde <div id="step2"> hasta el final del form y pégalo aquí -->
        <!-- Asegúrate de cambiar el fetch del carrito a localStorage.getItem('sb_carrito') -->

        <!-- Paso 3: Confirmación -->
        <!-- ... Copia también el paso 3 de confirmación y el botón de WhatsApp ... -->

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CART_KEY = 'sb_carrito';
        let carrito = [];
        let paso = 1;

        function cargarCarrito() {
            carrito = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
            if (carrito.length === 0) {
                document.getElementById('carritoItems').innerHTML = '<p class="text-center text-gray-600 py-12">Tu carrito está vacío</p>';
                return;
            }

            document.getElementById('carritoItems').innerHTML = carrito.map((item, i) => `
                <div class="flex gap-4 bg-white p-4 rounded-xl shadow-sm">
                    <img src="${item.imagen}" class="w-24 h-24 object-cover rounded-lg" alt="${item.nombre}">
                    <div class="flex-1">
                        <h3 class="font-medium">${item.nombre}</h3>
                        <p class="text-sb-green">₡${item.precioUnitario.toLocaleString()} c/u</p>
                        <div class="flex items-center gap-4 mt-2">
                            <div class="flex border rounded">
                                <button onclick="cambiarCantidad(${i}, -1)" class="px-3 py-1 hover:bg-gray-100">-</button>
                                <span class="px-4 py-1">${item.cantidad}</span>
                                <button onclick="cambiarCantidad(${i}, 1)" class="px-3 py-1 hover:bg-gray-100">+</button>
                            </div>
                            <span class="font-bold">₡${item.subtotal.toLocaleString()}</span>
                            <button onclick="eliminarItem(${i})" class="text-red-500 hover:text-red-700 ml-auto">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            calcularTotales();
        }

        function cambiarCantidad(index, delta) {
            carrito[index].cantidad += delta;
            if (carrito[index].cantidad < 1) carrito[index].cantidad = 1;
            carrito[index].subtotal = carrito[index].cantidad * carrito[index].precioUnitario;
            localStorage.setItem(CART_KEY, JSON.stringify(carrito));
            cargarCarrito();
        }

        function eliminarItem(index) {
            if (confirm('¿Eliminar este producto?')) {
                carrito.splice(index, 1);
                localStorage.setItem(CART_KEY, JSON.stringify(carrito));
                cargarCarrito();
            }
        }

        function calcularTotales() {
            const subtotal = carrito.reduce((sum, item) => sum + item.subtotal, 0);
            document.getElementById('subtotal').textContent = '₡' + subtotal.toLocaleString();
            document.getElementById('total').textContent = '₡' + subtotal.toLocaleString(); // + express cuando lo implementes
        }

        function goToStep(nuevoPaso) {
            document.getElementById(`stepContent${paso}`).classList.add('hidden');
            document.getElementById(`stepContent${nuevoPaso}`).classList.remove('hidden');
            document.getElementById(`step${paso}`).classList.replace('step-active', 'step-completed');
            document.getElementById(`step${nuevoPaso}`).classList.replace('step-pending', 'step-active');
            paso = nuevoPaso;
            window.scrollTo(0, 0);
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarCarrito();
            // Inicializa mapa y resto de checkout aquí (copia tu código anterior)
        });
    </script>
</body>
</html>
