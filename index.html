<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floristería Santa Bárbara | Flores frescas en Costa Rica</title>
    <meta name="description" content="Arreglos florales, rosas premium, plantas y entrega express en San José. Desde 2010 sorprendiendo momentos especiales.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sb: {
                            green: '#2D5A3D',
                            'green-light': '#4A7C59',
                            cream: '#F5F1E8',
                            rose: '#C41E3A',
                            'rose-soft': '#E8B4B8',
                            gold: '#D4AF37',
                            dark: '#1A1A1A'
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
        html { scroll-behavior: smooth; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="font-sans bg-sb-cream text-sb-dark min-h-screen">
    <!-- Header -->
    <header class="fixed w-full top-0 z-50 bg-white/95 backdrop-blur-md shadow-sm transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 md:h-20">
                <a href="#" class="flex items-center gap-3 group">
                    <span class="text-3xl animate-float">🌸</span>
                    <div>
                        <h1 class="font-serif text-xl md:text-2xl font-bold text-sb-green group-hover:text-sb-green-light">Santa Bárbara</h1>
                        <p class="text-xs text-gray-500 hidden sm:block">Flores frescas • Costa Rica</p>
                    </div>
                </a>

                <nav class="hidden md:flex items-center gap-8">
                    <a href="#" class="text-gray-600 hover:text-sb-green font-medium">Inicio</a>
                    <a href="#catalogo" class="text-gray-600 hover:text-sb-green font-medium">Catálogo</a>
                    <a href="#contacto" class="text-gray-600 hover:text-sb-green font-medium">Contacto</a>
                </nav>

                <div class="flex items-center gap-4">
                    <a href="carrito-checkout.html" class="relative p-2 text-gray-600 hover:text-sb-green">
                        <i class="fas fa-shopping-bag text-xl"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 bg-sb-rose text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
                    </a>
                    <a href="https://wa.me/50686053613" target="_blank" class="hidden sm:flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full">
                        <i class="fab fa-whatsapp"></i> Pedir
                    </a>
                    <button class="md:hidden p-2 text-gray-600 hover:text-sb-green" onclick="toggleMenu()">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Menú móvil -->
        <div id="mobileMenu" class="hidden md:hidden bg-white border-t">
            <div class="px-4 py-3 space-y-2">
                <a href="#" class="block py-2 text-gray-600 hover:text-sb-green">Inicio</a>
                <a href="#catalogo" class="block py-2 text-gray-600 hover:text-sb-green">Catálogo</a>
                <a href="carrito-checkout.html" class="block py-2 text-gray-600 hover:text-sb-green">Carrito</a>
                <a href="https://wa.me/50686053613" class="block py-2 text-green-600 font-medium">
                    <i class="fab fa-whatsapp mr-2"></i>WhatsApp
                </a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
        <!-- ... mantén tu hero tal cual, es hermoso ... -->
    </section>

    <!-- Catálogo (nueva sección integrada) -->
    <section id="catalogo" class="py-20 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="font-serif text-4xl text-sb-dark mb-4">Nuestro Catálogo</h2>
                <p class="text-gray-600 max-w-2xl mx-auto">Selecciona la categoría o explora todos nuestros arreglos frescos</p>
            </div>

            <!-- Filtros -->
            <div class="flex flex-wrap gap-3 justify-center mb-10 overflow-x-auto pb-4" id="filtros">
                <!-- Se llenan con JS -->
            </div>

            <!-- Productos -->
            <div id="productosGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                <!-- Se llenan con JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="contacto" class="bg-sb-dark text-white pt-16 pb-8">
        <!-- ... tu footer ... -->
    </footer>

    <!-- WhatsApp flotante -->
    <a href="https://wa.me/50686053613" target="_blank" class="fixed bottom-6 right-6 z-50 bg-green-500 hover:bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let productos = [];
        let categorias = [];
        const CART_KEY = 'sb_carrito';

        async function cargarDatos() {
            try {
                const res = await fetch('data/products.json');
                const data = await res.json();
                productos = data.productos?.filter(p => p.activo) || [];
                categorias = data.categorias?.filter(c => c.activa) || [];
                renderizarFiltros();
                filtrar('todos');
                actualizarContadorCarrito();
            } catch (err) {
                console.error('Error cargando datos:', err);
                document.getElementById('productosGrid').innerHTML = '<p class="col-span-full text-center py-12 text-gray-600">Error al cargar el catálogo. Intenta más tarde.</p>';
            }
        }

        function renderizarFiltros() {
            const container = document.getElementById('filtros');
            container.innerHTML = `
                <button onclick="filtrar('todos')" class="px-6 py-2 rounded-full bg-sb-green text-white font-medium">Todos</button>
                ${categorias.map(c => `
                    <button onclick="filtrar('${c.id}')" class="px-6 py-2 rounded-full border-2 border-gray-300 hover:bg-sb-green hover:text-white transition font-medium">
                        ${c.icono} ${c.nombre}
                    </button>
                `).join('')}
            `;
        }

        function filtrar(categoria) {
            const filtrados = categoria === 'todos' 
                ? productos 
                : productos.filter(p => p.categoria === categoria);

            const container = document.getElementById('productosGrid');
            container.innerHTML = filtrados.map(p => {
                const precio = p.precioTemporadaActivo && p.precioTemporada ? p.precioTemporada : p.precioRegular;
                const imagen = p.imagenes?.[0] || 'https://via.placeholder.com/400?text=Sin+Imagen';
                
                return `
                    <div class="product-card bg-white rounded-xl overflow-hidden shadow-md">
                        <div class="relative aspect-square">
                            <img src="${imagen}" alt="${p.nombre}" class="w-full h-full object-cover" loading="lazy">
                            ${p.precioTemporadaActivo ? `<span class="absolute top-3 left-3 bg-sb-rose text-white px-3 py-1 rounded-full text-xs font-bold">OFERTA</span>` : ''}
                        </div>
                        <div class="p-4">
                            <h3 class="font-serif text-lg font-semibold text-sb-dark">${p.nombre}</h3>
                            <p class="text-sm text-gray-600 mt-1 line-clamp-2">${p.descripcion || ''}</p>
                            <p class="text-xl font-bold text-sb-green mt-3">₡${precio.toLocaleString()}</p>
                            <button onclick="agregarAlCarrito('${p.id}')" class="w-full mt-4 bg-sb-green hover:bg-sb-green-light text-white py-3 rounded-xl font-medium transition">
                                <i class="fas fa-shopping-bag mr-2"></i>Agregar al carrito
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            if (!producto) return;

            let carrito = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
            const precio = producto.precioTemporadaActivo && producto.precioTemporada ? producto.precioTemporada : producto.precioRegular;
            const existente = carrito.find(item => item.id === id);

            if (existente) {
                existente.cantidad++;
                existente.subtotal = existente.cantidad * precio;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precioUnitario: precio,
                    imagen: producto.imagenes?.[0] || '',
                    cantidad: 1,
                    subtotal: precio
                });
            }

            localStorage.setItem(CART_KEY, JSON.stringify(carrito));
            actualizarContadorCarrito();

            // Feedback visual
            event.target.innerHTML = '<i class="fas fa-check mr-2"></i>¡Agregado!';
            event.target.classList.add('bg-green-600');
            setTimeout(() => {
                event.target.innerHTML = '<i class="fas fa-shopping-bag mr-2"></i>Agregar al carrito';
                event.target.classList.remove('bg-green-600');
            }, 1500);
        }

        function actualizarContadorCarrito() {
            const carrito = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
            const total = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            const badge = document.getElementById('cartCount');
            badge.textContent = total;
            badge.classList.toggle('hidden', total === 0);
        }

        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
            actualizarContadorCarrito();
        });
    </script>
</body>
</html>
